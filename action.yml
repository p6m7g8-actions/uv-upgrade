name: "P6 GHA: Upgrade Dependencies for UV Python Projects"
description: "Upgrade dependencies in uv.lock and open a pull request"
author: "Philip M. Gollucci"
inputs:
  gh_token:
    description: "Automation token used to trigger auto-approve events (P6_A_GH_TOKEN)"
    required: true
  python_version:
    description: "Python version"
    required: false
    default: "3.14.0"
runs:
  using: "composite"
  steps:
    - name: Checkout code
      uses: p6m7g8-actions/checkout@main
      with:
        fetch-depth: 0
        ref: main
    - name: Setup Python
      uses: actions/setup-python@v6.2.0
      with:
        python-version: ${{ inputs.python_version }}
    - name: Install dependencies
      shell: bash
      run: |
        pip install --upgrade pip
        pip install uv
        uv sync --dev
    - name: Update dependencies
      shell: bash
      run: |
        uv lock --upgrade
        uv sync --dev
        uv run pre-commit run --all-files
        git diff
    - name: Normalize GitHub token
      id: token
      uses: p6m7g8-actions/gh-token-normalize@main
      with:
        preferred-token: ${{ github.token }}
        fallback-token: ${{ inputs.gh_token }}
        default-token: ${{ github.token }}
    - name: Configure authenticated git remote
      shell: bash
      run: |
        git remote set-url origin "https://x-access-token:${{ steps.token.outputs.value }}@github.com/${{ github.repository }}.git"
    - name: Create Pull Request
      id: create_pr
      uses: peter-evans/create-pull-request@v8.1.0
      with:
        token: ${{ steps.token.outputs.value }}
        branch-token: ${{ steps.token.outputs.value }}
        commit-message: |-
          chore(deps): upgrade dependencies

          Upgrades project dependencies. See details in [workflow run].

          [Workflow Run]: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        branch: github-actions/upgrade-main
        title: "chore(deps): upgrade dependencies"
        labels: |
          auto-approve
          auto-merge
        reviewers: |
          p6m7g8-automation
        body: |-
          Upgrades project dependencies. See details in [workflow run].

          [Workflow Run]: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        author: github-actions <github-actions@github.com>
        committer: github-actions <github-actions@github.com>
        signoff: true
    - name: Re-label PR with automation token
      if: steps.create_pr.outputs.pull-request-number != ''
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.gh_token || github.token }}
      run: |
        pr="${{ steps.create_pr.outputs.pull-request-number }}"
        repo="${{ github.repository }}"
        gh api -X DELETE "repos/${repo}/issues/${pr}/labels/auto-approve" || true
        gh api "repos/${repo}/issues/${pr}/labels" -f labels[]='auto-approve'
